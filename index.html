<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리소 — 오늘 딱 5분</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #fdf8f4;
    color: #1a120b;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Progress bar */
  #progress-bar-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(26,18,11,0.1);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: #5a3e2b;
    width: 0%;
    transition: width 0.4s ease;
  }

  /* Step dots */
  #step-dots {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(26,18,11,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: #5a3e2b;
    transform: scale(1.4);
  }
  .dot-dark {
    background: rgba(255,255,255,0.3);
  }
  .dot-dark.active {
    background: #fff;
  }

  /* Steps */
  .step {
    display: none;
    min-height: 100vh;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .step.visible {
    display: flex;
    flex-direction: column;
  }
  .step.fade-in {
    opacity: 1;
  }

  /* STEP 1 */
  #step1 {
    background: #1a120b;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #step1 .tagline {
    color: #fff;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 300;
    letter-spacing: -0.02em;
    text-align: center;
    line-height: 1.4;
  }
  #step1 .sub {
    color: rgba(255,255,255,0.6);
    font-size: clamp(16px, 3vw, 20px);
    text-align: center;
    margin-top: 12px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  #step1 .sub.show { opacity: 1; }

  /* STEP 2 */
  #step2 {
    background: #fdf8f4;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .step-label {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a08060;
    margin-bottom: 20px;
    text-align: center;
  }
  #step2 h2 {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 400;
    text-align: center;
    margin-bottom: 40px;
    color: #1a120b;
    letter-spacing: -0.02em;
  }
  .emotion-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 420px;
    width: 100%;
  }
  .emotion-btn {
    background: #fff;
    border: 1.5px solid #e8ddd4;
    border-radius: 16px;
    padding: 18px 12px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .emotion-btn:hover { border-color: #a08060; background: #fdf8f4; }
  .emotion-btn:active { transform: scale(0.96); }
  .emotion-btn.selected {
    border-color: #5a3e2b;
    background: #f0e8de;
  }
  .emotion-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
  .emotion-label { font-size: 13px; color: #5a3e2b; font-weight: 400; }

  /* STEP 3 */
  #step3 {
    background: #fdf8f4;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }
  .loading-wrap {
    text-align: center;
    color: #a08060;
    font-size: 16px;
  }
  .dots-anim span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a08060;
    margin: 0 3px;
    animation: bounce 1s infinite;
  }
  .dots-anim span:nth-child(2) { animation-delay: 0.15s; }
  .dots-anim span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  .mission-card {
    display: none;
    background: #fff;
    border: 1.5px solid #e8ddd4;
    border-radius: 24px;
    padding: 36px 32px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }
  .mission-card.show { display: block; }
  .mission-icon { font-size: 40px; margin-bottom: 16px; }
  .mission-title {
    font-size: 22px;
    font-weight: 500;
    color: #1a120b;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .mission-desc {
    font-size: 15px;
    color: #7a5c3f;
    line-height: 1.7;
    margin-bottom: 28px;
  }
  .mission-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-primary {
    background: #1a120b;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary:hover { background: #3a2010; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: transparent;
    color: #a08060;
    border: 1px solid #e8ddd4;
    border-radius: 50px;
    padding: 14px 32px;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-secondary:hover { border-color: #a08060; color: #5a3e2b; }
  .btn-secondary:disabled { opacity: 0.35; cursor: not-allowed; }

  /* STEP 4 */
  #step4 {
    background: #fdf8f4;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }
  .seed-wrap {
    position: relative;
    width: 100px; height: 100px;
    margin: 0 auto 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .seed-emoji {
    font-size: 56px;
    display: block;
    animation: seedGrow 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes seedGrow {
    0% { transform: scale(0.4); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .seed-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,153,76,0.18) 0%, transparent 70%);
    animation: glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
  }
  #step4 h2 {
    font-size: clamp(24px, 5vw, 32px);
    font-weight: 400;
    color: #1a120b;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  #step4 p {
    font-size: 16px;
    color: #7a5c3f;
    line-height: 1.7;
  }

  /* STEP 5 */
  #step5 {
    background: #1a120b;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    text-align: center;
  }
  #step5 h2 {
    font-size: clamp(22px, 4.5vw, 32px);
    font-weight: 300;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .counter-text {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }
  .counter-text span {
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }
  .email-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
  }
  .email-input {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    padding: 16px 24px;
    font-size: 16px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .email-input::placeholder { color: rgba(255,255,255,0.35); }
  .email-input:focus { border-color: rgba(255,255,255,0.4); }
  .btn-cta {
    background: #fff;
    color: #1a120b;
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-cta:hover { background: #f0e8de; }
  .btn-cta:active { transform: scale(0.97); }
  .success-msg {
    display: none;
    color: rgba(255,255,255,0.85);
    font-size: 16px;
    line-height: 1.7;
    padding: 20px;
  }
  .success-msg .num {
    font-size: 28px;
    font-weight: 300;
    color: #fff;
    display: block;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
  }

  /* FAQ */
  .faq-wrap {
    margin-top: 48px;
    max-width: 380px;
    width: 100%;
    text-align: left;
  }
  .faq-item {
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 16px 0;
  }
  .faq-q {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
  }
  .faq-a {
    font-size: 14px;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="progress-bar-wrap">
  <div id="progress-bar"></div>
</div>

<div id="step-dots">
  <div class="dot dot-dark active" id="dot-1"></div>
  <div class="dot dot-dark" id="dot-2"></div>
  <div class="dot dot-dark" id="dot-3"></div>
  <div class="dot dot-dark" id="dot-4"></div>
  <div class="dot dot-dark" id="dot-5"></div>
</div>

<!-- STEP 1 -->
<div class="step visible" id="step1">
  <p class="tagline">오늘 딱 5분.</p>
  <p class="sub" id="step1-sub">지금 해볼게요.</p>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <p class="step-label">오늘의 체크인</p>
  <h2>지금 내 감정은?</h2>
  <div class="emotion-grid" id="emotion-grid">
    <button class="emotion-btn" data-emotion="good" onclick="selectEmotion(this)">
      <span class="emotion-emoji">😊</span>
      <span class="emotion-label">괜찮아요</span>
    </button>
    <button class="emotion-btn" data-emotion="meh" onclick="selectEmotion(this)">
      <span class="emotion-emoji">😐</span>
      <span class="emotion-label">보통이에요</span>
    </button>
    <button class="emotion-btn" data-emotion="tired" onclick="selectEmotion(this)">
      <span class="emotion-emoji">😔</span>
      <span class="emotion-label">지쳐요</span>
    </button>
    <button class="emotion-btn" data-emotion="irritated" onclick="selectEmotion(this)">
      <span class="emotion-emoji">😤</span>
      <span class="emotion-label">예민해요</span>
    </button>
    <button class="emotion-btn" data-emotion="sad" onclick="selectEmotion(this)">
      <span class="emotion-emoji">😢</span>
      <span class="emotion-label">힘들어요</span>
    </button>
    <button class="emotion-btn" data-emotion="drained" onclick="selectEmotion(this)">
      <span class="emotion-emoji">🔥</span>
      <span class="emotion-label">방전됐어요</span>
    </button>
  </div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <div id="loading-anim" class="loading-wrap">
    <p style="margin-bottom:16px;">잠깐, 오늘의 미션 찾는 중...</p>
    <div class="dots-anim">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div id="mission-card" class="mission-card">
    <div class="mission-icon" id="m-icon"></div>
    <h3 class="mission-title" id="m-title"></h3>
    <p class="mission-desc" id="m-desc"></p>
    <div class="mission-actions">
      <button class="btn-primary" onclick="goToStep(4)">이 미션 할게요 →</button>
      <button class="btn-secondary" id="btn-swap" onclick="swapMission()">다른 미션으로</button>
    </div>
  </div>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">
  <div class="seed-wrap">
    <div class="seed-glow"></div>
    <span class="seed-emoji">🌱</span>
  </div>
  <h2>오늘도 나를 돌봤어요 🌱</h2>
  <p>이게 전부예요.<br>매일 이것만 해도 돼요.</p>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
  <h2>21일 동안 이렇게 하면 돼요.</h2>
  <p class="counter-text">지금 <span id="waitlist-count">47</span>명이 오픈을 기다리고 있어요</p>

  <div class="email-form" id="email-form-wrap">
    <input type="email" class="email-input" id="email-input" placeholder="이메일 주소" />
    <button class="btn-cta" onclick="submitEmail()">가장 먼저 시작하기</button>
  </div>

  <div class="success-msg" id="success-msg">
    <span class="num" id="rank-num"></span>
    번째로 등록됐어요 🌱
  </div>

  <div class="faq-wrap">
    <div class="faq-item">
      <p class="faq-q">무료인가요?</p>
      <p class="faq-a">얼리버드 등록자에게는 첫 21일을 무료로 드립니다.</p>
    </div>
    <div class="faq-item">
      <p class="faq-q">앱을 따로 설치해야 하나요?</p>
      <p class="faq-a">별도 설치 없이 웹에서 바로 시작할 수 있어요. 앱도 곧 나올 예정이에요.</p>
    </div>
  </div>
</div>

<script>
const MISSIONS = {
  good:      { icon: '🌳', title: '오늘 아이와 5분 산책', desc: '밖에 나가 5분만 함께 걸어보세요. 짧아도 괜찮아요. 그 시간이 남아요.' },
  meh:       { icon: '🎵', title: '좋아하는 음악 한 곡 듣기', desc: '지금 이 순간만큼은 그 음악에만 집중해보세요. 다른 건 잠깐 내려놓고.' },
  tired:     { icon: '🪟', title: '5분 혼자 있기', desc: '아무것도 안 해도 돼요. 그냥 조용히 앉아만 있어도 이건 쉬는 거예요.' },
  irritated: { icon: '🌬️', title: '창문 열고 깊게 숨쉬기 3번', desc: '신선한 공기를 들이쉬며 천천히. 3번이면 충분해요.' },
  sad:       { icon: '📝', title: '지금 이 감정을 한 줄로 적어보기', desc: '잘 쓰지 않아도 돼요. 지금 느끼는 걸 있는 그대로 한 줄만 꺼내보세요.' },
  drained:   { icon: '🫁', title: '4-7-8 호흡 한 세트', desc: '4초 들이쉬고, 7초 멈추고, 8초 내쉬어요. 딱 한 세트만. 몸이 조금 달라져요.' }
};

const ALT_MISSIONS = [
  { icon: '💧', title: '물 한 잔 천천히 마시기', desc: '서두르지 않고, 맛을 느끼면서 천천히.' },
  { icon: '🤲', title: '손 씻으며 30초 멈추기', desc: '씻는 동안만큼은 아무 생각 안 해도 돼요. 그냥 물의 온도를 느껴보세요.' }
];

let currentStep = 1;
let selectedEmotion = null;
let swapUsed = false;

const progressMap = { 1: 0, 2: 25, 3: 55, 4: 80, 5: 100 };

function updateProgress(step) {
  document.getElementById('progress-bar').style.width = progressMap[step] + '%';
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.toggle('active', i === step);
  }
  const isDark = step === 1 || step === 5;
  for (let i = 1; i <= 5; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.classList.toggle('dot-dark', isDark);
  }
}

function goToStep(n) {
  const current = document.getElementById('step' + currentStep);
  current.classList.remove('fade-in');
  setTimeout(() => {
    current.classList.remove('visible');
    const next = document.getElementById('step' + n);
    next.classList.add('visible');
    setTimeout(() => next.classList.add('fade-in'), 30);
    currentStep = n;
    updateProgress(n);
    if (n === 3) startMissionLoad();
    if (n === 5) animateCounter();
    window.scrollTo(0, 0);
  }, 300);
}

function selectEmotion(btn) {
  selectedEmotion = btn.dataset.emotion;
  document.querySelectorAll('.emotion-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setTimeout(() => goToStep(3), 320);
}

function startMissionLoad() {
  document.getElementById('loading-anim').style.display = 'block';
  document.getElementById('mission-card').classList.remove('show');
  swapUsed = false;
  document.getElementById('btn-swap').disabled = false;
  setTimeout(() => {
    document.getElementById('loading-anim').style.display = 'none';
    showMission(MISSIONS[selectedEmotion || 'tired']);
  }, 800);
}

function showMission(m) {
  document.getElementById('m-icon').textContent = m.icon;
  document.getElementById('m-title').textContent = m.title;
  document.getElementById('m-desc').textContent = m.desc;
  document.getElementById('mission-card').classList.add('show');
}

function swapMission() {
  if (swapUsed) return;
  swapUsed = true;
  document.getElementById('btn-swap').disabled = true;
  const alt = ALT_MISSIONS[Math.floor(Math.random() * ALT_MISSIONS.length)];
  document.getElementById('mission-card').classList.remove('show');
  setTimeout(() => showMission(alt), 200);
}

function animateCounter() {
  const saved = localStorage.getItem('riso_waitlist_count');
  const base = saved ? parseInt(saved) : 47;
  document.getElementById('waitlist-count').textContent = base;
}

function submitEmail() {
  const email = document.getElementById('email-input').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('email-input').focus();
    return;
  }
  localStorage.setItem('riso_email', email);
  const current = parseInt(document.getElementById('waitlist-count').textContent);
  const rank = current + 1;
  localStorage.setItem('riso_waitlist_count', rank);
  document.getElementById('email-form-wrap').style.display = 'none';
  document.getElementById('rank-num').textContent = rank;
  document.getElementById('success-msg').style.display = 'block';
  document.getElementById('waitlist-count').textContent = rank;
}

// STEP 1 init
window.addEventListener('load', () => {
  const step1 = document.getElementById('step1');
  step1.classList.add('fade-in');

  setTimeout(() => {
    document.getElementById('step1-sub').classList.add('show');
  }, 500);

  setTimeout(() => goToStep(2), 3000);

  step1.addEventListener('click', () => {
    if (currentStep === 1) goToStep(2);
  });

  updateProgress(1);
});

// STEP 4 auto advance
const origGoToStep = goToStep;
const _goToStep = goToStep;
window.goToStep = function(n) {
  _goToStep(n);
  if (n === 4) {
    setTimeout(() => _goToStep(5), 3200);
  }
};
</script>
</body>
</html>
